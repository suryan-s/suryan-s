name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs once a day at 1:00 AM, giving main.yml (animation generated at midnight) time to finish
    - cron: "0 1 * * *"

jobs:
  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          BLOCKS: ->
          TIME_RANGE: all_time
          SHOW_TIME: true
          SHOW_MASKED_TIME: true
          # Show more languages (increased from 5 to 20)
          LANG_COUNT: 20
          IGNORED_LANGUAGES: Binary YAML JSON TOML Docker
